<!doctype html>
<html lang="eng">
  <title>Product Management Page</title>

  <body>
    <link rel="stylesheet" href="../Design/Style.css" />

    <head>
      <script src="../JS/Validation.js"></script>
    </head>

    <div class="main-container">
      <div class="form-title-box">Product Management Page</div>

      <form>
        <label for="unitPrice">Unit Price:</label> <br />
        <input
          type="number"
          id="unitPrice"
          name="unitPrice"
          value="1000"
          readonly
        />
        <br />

        <label for="quantity">Quantity per Day:</label> <br />
        <input
          type="number"
          id="quantity"
          name="quantity"
          placeholder="Enter quantity per day"
        />
        <span class="errmsg" id="err_quantity">
          Quantity cannot be less than 0.
        </span>
        <br />

        <label for="totalPrice">Total Price for 30 Days:</label> <br />
        <input
          type="number"
          id="totalPrice"
          name="totalPrice"
          value="0"
          readonly
        />
      </form>
    </div>
  </body>
</html>
